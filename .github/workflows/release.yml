name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@e4ca3dc542ca05105db086cb69156ff8ed60bc12 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
