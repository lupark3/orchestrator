## FASE 5 — CLEANUP

```
🧹 Caderno de campo ([nome do arquivo]):
  1. 🗑️ Apagar
  2. 📁 Arquivar (mover para manus_archive/)
  3. 📌 Manter onde está
```
**⚠️ GATE G8**

- Opção 1 → `rm [arquivo]`
- Opção 2 → `mkdir -p manus_archive && mv [arquivo] manus_archive/`
- Opção 3 → não faça nada
- **NUNCA** apague sem resposta explícita.

